<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Sessions</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="icon" type="image/x-icon" href="/static/Logo_nobackground.png">
</head>

<body class="body">

<div class="content-wrapper">
    <h1 class="page-title">My Sessions</h1>

    <div class="main-layout">
        {% if my_sessions and my_sessions|length > 0 %}
        <div class="card">
        <table class="session-table">
            <thead>
                <tr>
                    <th>Course</th>
                    <th>Date & Time</th>
                    <th>Tutor</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody>
                {% for s in my_sessions %}
                <tr>
                    <td><b>{{ s.course_name }}</b></td>
                    <td>{{ s.session_datetime }}</td>
                    <td>{{ s.fname }} {{ s.lname }}</td>
                    <td>{{ s.session_status }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        {% else %}
            <p>No bookings yet.</p>
        {% endif %}
        </div>
        
    </div>
</div>

</body>
</html>
