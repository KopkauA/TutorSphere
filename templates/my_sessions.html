<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Sessions</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body class="body">

<div class="content-wrapper">
    <h1 class="page-title">My Sessions</h1>
    <div class="main-layout">
        
        <!-- MAIN -->
        <div class="card">

            <h3>My Booked Sessions</h3>

            {% if my_sessions and my_sessions|length > 0 %}
                <ul class="session-list">
                    {% for s in my_sessions %}
                        <li class="session-item">
                            <div class="session-course">
                                <b>{{ s.course_name }}</b>
                            </div>

                            <div class="session-time">
                                {{ s.session_datetime }}
                            </div>

                            <div class="session-tutor">
                                with {{ s.fname }} {{ s.lname }}
                            </div>
                        </li>
                    {% endfor %}
                </ul>
            {% else %}
                <p>No bookings yet.</p>
            {% endif %}

        </div>

    </div>

</div>

</body>
</html>
