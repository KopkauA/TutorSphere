<!--

Description: signup page for student
Purpose: gives student the role of student 

-->

<!DOCTYPE html>
<html>
<head>
  <title>Create Account</title>
  <link rel="icon" type="image/x-icon" href="/static/Logo_nobackground.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">  
  <style>
    :root {
      --primary: #4a90e2;
      --primary-dark: #357abd;
      --bg: #f4f6f8;
      --text: #333;
      --muted: #777;
      --border: #ddd;
      --shadow: 0 10px 25px rgba(0,0,0,0.08);
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #f4f6f8, #e9eef5);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: var(--text);
    }

    .container {
      width: 100%;
      max-width: 420px;
      background: #fff;
      padding: 32px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      text-align: center;
    }

    h2 {
      font-size: 24px;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .input-box {
      position: relative;
      margin-bottom: 16px;
    }

    .input-box i {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
    }

    .input-box input,
    .input-box select {
      width: 100%;
      padding: 12px 12px 12px 40px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      transition: 0.2s ease;
    }

    .input-box input:focus,
    .input-box select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(74,144,226,0.15);
    }

    button {
      width: 100%;
      padding: 12px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s ease;
      margin-top: 8px;
    }

    button:hover {
      background: var(--primary-dark);
    }

    a {
      display: block;
      margin-top: 16px;
      font-size: 13px;
      color: var(--primary);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .row .input-box {
      flex: 1;
    }
    .error {
      color: red;
      font-size: 12px;
      margin-bottom: 12px;
    }
  </style>
</head>

<body>
  <div class= "container">
    <h2>Create Account</h2>
    <div class="subtitle">Fill in your account details to get started</div>
      
    <form method="POST" action="{{ url_for('signup_route') }}">
      <div class="input-box">
        <i class="fa fa-user-tag"></i>
        <select name="role" required>
          <option value="">Select account type</option>
          <option value="student">Student</option>
          <option value="tutor">Tutor</option>
        </select>
      </div>

      <div class="row">
        <!-- FIRST NAME -->
        <div class="input-box">
          <i class="fa fa-user"></i>
          <input type="text" name="fname" placeholder="First name" required>
        </div>

        <!-- LAST NAME -->
        <div class="input-box">
          <i class="fa fa-user"></i>
          <input type="text" name="lname" placeholder="Last name" required>
        </div>
      </div>

      <!-- EMAIL -->
      <div class="input-box">
        <i class="fa fa-envelope"></i>
        <input type="email" name="email" placeholder="Email address" required>
      </div>

      <!-- PASSWORD -->
      <div class="input-box">
        <i class="fa fa-lock"></i>
        <input type="password" name="password" placeholder="Password" required>
      </div>

      <!-- ERROR -->
      {% if error %}
        <div class="error">{{ error }}</div>
      {% endif %}

      <button type="submit">Next</button>
    </form>

    <a href="{{ url_for('login_route') }}">Already have an account? Login</a>
  </div>
</body>
</html>
