<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="icon" type="image/x-icon" href="/static/Logo_nobackground.png">
</head>


<body class="profile-page"> 
    <nav class="navbar">
        <div class="nav-left">
            <a href="{{ url_for('dashboard_route') }}" class="logo">
                <img src="{{ url_for('static', filename='Logo_textonly.png') }}" alt="Logo">
            </a>
        </div>

        <div class="nav-right">
            <div class="nav-links">
                <a href="{{ url_for('dashboard_route') }}">Home</a>
                <a href="{{ url_for('search_sessions_route') }}">Schedule</a>
                <a href="{{ url_for('my_sessions_route') }}">My Sessions</a>
                <a href="{{ url_for('view_my_profile_route') }}">Profile</a>
            </div>
            <a href="{{ url_for('logout_route') }}" class="logout-link">Logout</a>  
        </div>
    </nav>

    <div class="profile-container">

        <!-- TOP BAR -->
        <div class="profile-header">
            <h1 class="profile-title">My Profile</h1>        
        </div>

        <!-- USER INFO -->
        <div class="card">
            <div class="row">
                <div><strong>First Name:</strong> {{ user.fname }}</div>
            </div>

            <div class="row">
                <div><strong>Last Name:</strong> {{ user.lname }}</div>
            </div>

            <div class="row">
                <div><strong>Email:</strong> {{ user.email }}</div>
            </div>
        </div>

        <!-- TUTOR SETTINGS -->
        {% if user.is_tutor == 1 %}

        <h2 class="section-title">Tutoring Settings</h2>

        <div class="card">

            <form method="POST">

                <!-- courses (original dropdown/autocomplete) -->
                <div class="form-group">
                    <label class="form-label">Courses you teach</label>

                    <div class="autocomplete-wrapper">
                        <input type="text"
                            id="courseInput"
                            class="form-input"
                            placeholder="Type a course name..."
                            autocomplete="off">

                        <div id="suggestions" class="suggestions"></div>
                    </div>

                    <div id="selectedCourses"></div>

                    <input type="hidden" name="course_ids" id="courseIds">
                </div>

                <!-- availability -->
                <div class="form-group">
                    <label>Current Availability</label>
                    <div id="availability-container"></div>
                </div>

                <button type="submit" class="button">Save Changes</button>

            </form>
        </div>

        {% endif %}
</div>
</body>


<script>
let selected = [];
let existingAvailability = [];

document.addEventListener("DOMContentLoaded", async () => {

    const res = await fetch("/api/profile");
    const data = await res.json();

    selected = data.courses.map(c => ({
        id: c.course_id,
        name: c.course_name
    }));

    existingAvailability = data.availability || [];

    updateUI();
    renderAvailability();
});
</script>

<!-- course autocomplete selector -->
<script>
document.addEventListener("DOMContentLoaded", function () {

    const input = document.getElementById("courseInput");
    if (!input) return;

    input.addEventListener("input", async function () {

        const q = this.value;

        if (q.length < 1) {
            document.getElementById("suggestions").innerHTML = "";
            return;
        }

        const res = await fetch(`/api/courses?q=${q}`);
        const data = await res.json();

        let html = "";

        if (!data.courses || data.courses.length === 0) {
            html = `<div>No results</div>`;
        } else {
            data.courses.forEach(c => {
                html += `
                    <div class="suggestion-item" onclick="addCourse('${c.id}', '${c.name}')">
                        ${c.name}
                    </div>
                `;
            });
        }

        document.getElementById("suggestions").innerHTML = html;
    });
});

function addCourse(id, name) {
    if (selected.find(c => c.id === id)) return;

    selected.push({ id, name });

    document.getElementById("courseInput").value = "";
    document.getElementById("suggestions").innerHTML = "";

    updateUI();
}

function removeCourse(id) {
    selected = selected.filter(c => c.id !== id);
    updateUI();
}

function updateUI() {
    const container = document.getElementById("selectedCourses");
    const hidden = document.getElementById("courseIds");

    if (!container || !hidden) return;

    container.innerHTML = "";

    selected.forEach(c => {
        container.innerHTML += `
            <span class="chip">
                ${c.name}
                <button type="button" onclick="removeCourse('${c.id}')">x</button>
            </span>
        `;
    });

    hidden.value = selected.map(c => c.id).join(",");
}
</script>

<!-- availability logic -->
<script>
const days = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];

function formatTime(hour) {
    let period = hour >= 12 ? "PM" : "AM";
    let displayHour = hour % 12 || 12;
    return `${displayHour}:00 ${period}`;
}

function generateTimes(label) {
    let options = `<option value="" disabled selected>${label}</option>`;

    for (let h = 7; h <= 21; h++) {
        options += `<option value="${String(h).padStart(2,'0')}:00">${formatTime(h)}</option>`;
    }

    return options;
}

function renderAvailability() {
    const container = document.getElementById("availability-container");
    if (!container) return;

    container.innerHTML = days.map(day => {

        const match = existingAvailability.find(a => a.week_day === day);

        const display = match ? "block" : "none";
        const checked = match ? "checked" : "";

        const startVal = match ? match.shift_start_time.slice(0,5) : "";
        const endVal = match ? match.shift_end_time.slice(0,5) : "";
        const locVal = match ? match.tutor_location : "";

        return `
            <div class="day-block">
                <label>
                    <input type="checkbox" onchange="toggleDay('${day}')" ${checked}>
                    <strong>${day}</strong>
                </label>

                <div id="${day}-times" class="time-block time-row" style="display:${display};">
                    
                    <div class="time-row">
                        <select name="${day}_start" class="form-input">
                            ${generateTimes("Select start time")}
                        </select>

                        <select name="${day}_end" class="form-input">
                            ${generateTimes("Select end time")}
                        </select>

                        <select name="${day}_location" class="form-input">
                            <option value="" disabled selected>Select location</option>
                            <option value="In-person">In-person (LIB206)</option>
                            <option value="Microsoft Teams">Microsoft Teams</option>
                        </select>
                    </div>

                </div>
            </div>
        `;
    }).join("");

    // after rendering the page, insert the saved values
    existingAvailability.forEach(a => {
        const day = a.week_day;
        const start = document.querySelector(`[name="${day}_start"]`);
        const end = document.querySelector(`[name="${day}_end"]`);
        const loc = document.querySelector(`[name="${day}_location"]`);

        if (start) start.value = a.shift_start_time.slice(0,5);
        if (end) end.value = a.shift_end_time.slice(0,5);
        if (loc) loc.value = a.tutor_location;
    });
}

function toggleDay(day) {
    const div = document.getElementById(`${day}-times`);
    const open = div.style.display === "block";

    div.style.display = open ? "none" : "block";

    if (open) {
        div.querySelectorAll("select").forEach(s => s.value = "");
    }
}
</script>

</body>
</html>
