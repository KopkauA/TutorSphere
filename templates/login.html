<!--

Description: This is a general log-in page
Purpose: Brings user to the home page

-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/x-icon" href="/static/Logo_nobackground.png">
  <title>Login - TutorSphere</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='styles.css') }}">

</head>

<body class="center-page">
  <div class="login-container">
    <h2>Welcome to TutorSphere</h2>
    <div class="subtitle">Please enter your credentials to continue</div>

    <form method="POST" action="{{ url_for('login_route') }}">
      <!-- EMAIL -->
      <div class="input-box">
        <i class="fa fa-user"></i>
        <input type="email" name="email" placeholder="Email address" required>
      </div>

      <!-- PASSWORD -->
      <div class="input-box">
        <i class="fa fa-lock"></i>
        <input type="password" name="password" placeholder="Password" required>
      </div>
      
      <!-- ERROR MESSAGE -->
      <p class="error">{{ error }}</p>

      <button type="submit" class = "button">Login</button>
    </form>

    <a class="link" href="{{ url_for('signup_route') }}">Don't have an account? Sign up</a>
  </div>
</body>
</html>
