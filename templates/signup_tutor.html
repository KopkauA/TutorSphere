<!-- 

STEP 2 OF SIGNUP: this is where tutors will select their availability and courses they teach
 
 -->

<!DOCTYPE html>
<html>
<head>
    <title>Tutor Setup</title>

    <link rel="icon" type="image/x-icon" href="/static/Logo_nobackground.png">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>
<div class="content-wrapper">
    <h1 class="page-title">Tutor Setup</h1>
    <div class="card">

        <form method="POST">
            <!-- COURSES INPUT -->
            <div class="form-group">
                <label class="form-label">Courses you teach</label>

                <input
                    type="text"
                    id="courseInput"
                    class="form-input"
                    placeholder="Type a course name..."
                    autocomplete="off"
                >

                <div id="suggestions" class="suggestions"></div>

                <!-- selected -->
                <div id="selectedCourses" style="margin-top: 12px;"></div>

                <!-- backend stores course IDs -->
                <input type="hidden" name="course_ids" id="courseIds">
            </div>

            <!-- AVAILABILITY -->
            <div class="form-group">
                <label class="form-label">Available Time</label>
                <div id="availability-container"></div>
            </div>

            <button type="submit" class="button">Finish Setup</button>

        </form>

    </div>

</div>

<!--For course selection-->
<script>

let selected = []; // {id, name}

// autocomplete logic
document.getElementById("courseInput").addEventListener("input", async function () {
    const q = this.value;

    if (q.length < 1) {
        document.getElementById("suggestions").innerHTML = "";
        return;
    }

    const res = await fetch(`/api/courses?q=${q}`);
    const data = await res.json();

    let html = "";

    data.courses.forEach(c => {
        html += `
            <div class="suggestion-item" onclick="addCourse('${c.id}', '${c.name}')">
                ${c.name}
            </div>
        `;
    });

    document.getElementById("suggestions").innerHTML = html;
});

// add course
function addCourse(id, name) {
    if (selected.find(c => c.id === id)) return;

    selected.push({id, name});
    updateUI();
}

// remove course
function removeCourse(id) {
    selected = selected.filter(c => c.id !== id);
    updateUI();
}

// update UI + hidden input
function updateUI() {
    const container = document.getElementById("selectedCourses");
    const hidden = document.getElementById("courseIds");

    container.innerHTML = "";

    selected.forEach(c => {
        container.innerHTML += `
            <span class="chip">
                ${c.name}
                <button type="button" onclick="removeCourse('${c.id}')">×</button>
            </span>
        `;
    });

    hidden.value = selected.map(c => c.id).join(",");
}
</script>

<!--For availability selection-->
<script>
const days = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];

function formatTime(hour, minute) {
    let period = hour >= 12 ? "PM" : "AM";
    let displayHour = hour % 12 || 12;
    let min = minute === 0 ? "00" : "30";
    return `${displayHour}:${min} ${period}`;
}

function generateTimes() {
    let options = `<option value="" selected disabled>Select time</option>`;

    for (let h = 7; h <= 21; h++) {
        options += `<option value="${String(h).padStart(2,'0')}:00">${formatTime(h,0)}</option>`;
        options += `<option value="${String(h).padStart(2,'0')}:30">${formatTime(h,30)}</option>`;
    }

    return options;
}

function renderAvailability() {
    const container = document.getElementById("availability-container");

    container.innerHTML = days.map(day => `
        <div class="day-block">
            <label>
                <input type="checkbox" onchange="toggleDay('${day}')">
                <strong>${day}</strong>
            </label>

            <div id="${day}-times" class="time-block">
                <select name="${day}_start" class="form-input">
                    ${generateTimes()}
                </select>

                <select name="${day}_end" class="form-input">
                    ${generateTimes()}
                </select>
            </div>
        </div>
    `).join("");
}

function toggleDay(day) {
    const div = document.getElementById(`${day}-times`);
    const isOpen = div.style.display === "block";

    div.style.display = isOpen ? "none" : "block";

    if (isOpen) {
        div.querySelectorAll("select").forEach(s => s.value = "");
    }
}

document.addEventListener("DOMContentLoaded", renderAvailability);
</script>


</body>
</html>
